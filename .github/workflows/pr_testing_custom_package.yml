name: PR-Test-Custom-Package

on:
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  # Check if the comment contains a package#branch pattern and is on a PR
  check-comment:
    if: github.event.issue.pull_request
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      packages_json: ${{ steps.parse.outputs.packages_json }}
      packages_display: ${{ steps.parse.outputs.packages_display }}
    steps:
      - name: Check if comment matches pattern
        id: check
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if echo "$COMMENT" | grep -qE '[A-Za-z][A-Za-z0-9_]*#[A-Za-z0-9._/-]+'; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Parse packages and branches
        id: parse
        if: steps.check.outputs.should_run == 'true'
        run: |
          COMMENT="${{ github.event.comment.body }}"

          # Extract all package#branch patterns
          PACKAGES=$(echo "$COMMENT" | grep -oE '[A-Za-z][A-Za-z0-9_]*#[A-Za-z0-9._/-]+')

          # Build JSON array for packages
          JSON_ARRAY="["
          DISPLAY_LIST=""
          FIRST=true

          while IFS= read -r PACKAGE_BRANCH; do
            PACKAGE_NAME=$(echo "$PACKAGE_BRANCH" | cut -d'#' -f1)
            BRANCH_NAME=$(echo "$PACKAGE_BRANCH" | cut -d'#' -f2)

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON_ARRAY="${JSON_ARRAY},"
              DISPLAY_LIST="${DISPLAY_LIST}, "
            fi

            JSON_ARRAY="${JSON_ARRAY}{\"package\":\"${PACKAGE_NAME}\",\"branch\":\"${BRANCH_NAME}\"}"
            DISPLAY_LIST="${DISPLAY_LIST}${PACKAGE_NAME}#${BRANCH_NAME}"

            echo "Found: $PACKAGE_NAME#$BRANCH_NAME"
          done <<< "$PACKAGES"

          JSON_ARRAY="${JSON_ARRAY}]"

          echo "packages_json=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "packages_display=$DISPLAY_LIST" >> $GITHUB_OUTPUT
          echo "Packages JSON: $JSON_ARRAY"
          echo "Display: $DISPLAY_LIST"

  test:
    needs: check-comment
    if: needs.check-comment.outputs.should_run == 'true'
    name: Julia ${{ matrix.julia-version }} - ${{ matrix.os }} (Custom: ${{ needs.check-comment.outputs.packages_display }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: ['1']
        julia-arch: [x64]
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
      - name: Add reaction to comment
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ github.event.comment.id }},
              content: 'rocket'
            })

      - name: Checkout PR code
        uses: actions/checkout@v3
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head

      - name: Setup Julia
        uses: julia-actions/setup-julia@latest
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ matrix.julia-arch }}

      - name: Build package with custom dependencies
        shell: julia --project=. {0}
        run: |
          using Pkg
          using JSON3

          # First, instantiate the project
          Pkg.instantiate()

          # Parse the packages JSON
          packages_json = """${{ needs.check-comment.outputs.packages_json }}"""
          packages = JSON3.read(packages_json)

          println("Adding $(length(packages)) custom package(s):")

          # Add each custom package with its specific branch
          for pkg_info in packages
            package_name = pkg_info.package
            branch_name = pkg_info.branch

            # Construct the package URL (assuming NREL-Sienna organization)
            package_url = "https://github.com/NREL-Sienna/$(package_name).jl.git"

            println("\n→ Adding custom package: $package_name from branch: $branch_name")
            println("  URL: $package_url")

            try
              Pkg.add(url=package_url, rev=branch_name)
              println("  ✓ Successfully added $package_name#$branch_name")
            catch e
              @error "Failed to add custom package $package_name#$branch_name" exception=(e, catch_backtrace())
              rethrow()
            end
          end

          println("\nUpdating and building all packages...")
          # Update and build
          Pkg.update()
          Pkg.build()
          println("✓ Build complete")
        env:
          PYTHON: ""

      - name: Run tests
        uses: julia-actions/julia-runtest@latest
        env:
          PYTHON: ""

      - name: Process coverage
        uses: julia-actions/julia-processcoverage@v1

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment result
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = '${{ job.status }}';
            const packagesDisplay = '${{ needs.check-comment.outputs.packages_display }}';
            const os = '${{ matrix.os }}';
            const emoji = status === 'success' ? '✅' : '❌';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `${emoji} Test with \`${packagesDisplay}\` on ${os}: **${status}**`
            })
